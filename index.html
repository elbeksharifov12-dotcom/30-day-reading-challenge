<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Library v3.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(20, 20, 25, 0.8);
            --neon: #00f2fe;
            --accent: #7000ff;
            --text: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 10% 20%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.15) 0%, transparent 40%);
            color: var(--text);
            margin: 0;
            padding-bottom: 80px;
            min-height: 100vh;
        }

        /* Navbar */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .nav-item {
            color: rgba(255,255,255,0.5);
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item.active { color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        /* Sections */
        .section { display: none; padding: 25px; animation: fadeIn 0.5s ease; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Premium Cards */
        .glass-card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h1 { font-size: 28px; background: linear-gradient(to right, #00f2fe, #7000ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Leaderboard Style */
        .rank-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            margin-bottom: 12px;
            transition: 0.3s;
        }

        .rank-item:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }

        .rank-num { font-size: 22px; font-weight: 800; width: 40px; color: var(--neon); }

        .user-avatar {
            width: 45px; height: 45px;
            background: linear-gradient(45deg, var(--accent), var(--neon));
            border-radius: 15px;
            margin-right: 15px;
            display: flex; align-items: center; justify-content: center;
        }

        .score-pill {
            background: rgba(0, 242, 254, 0.15);
            padding: 5px 12px;
            border-radius: 12px;
            color: var(--neon);
            font-weight: bold;
        }

        /* Buttons */
        .glow-btn {
            background: linear-gradient(45deg, var(--accent), var(--neon));
            border: none; color: white;
            padding: 15px 30px;
            border-radius: 20px;
            width: 100%;
            font-size: 18px; font-weight: bold;
            box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3);
            cursor: pointer;
        }

        input {
            width: 90%; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 15px;
            color: white; margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div id="home" class="section active">
        <h1>Xush kelibsiz! ✨</h1>
        <div class="glass-card">
            <p style="color: #aaa;">Bugun qancha kitob o'qidingiz?</p>
            <input type="text" id="userName" placeholder="Ismingizni kiriting...">
            <button class="glow-btn" onclick="addActivity()">📖 O'qidim deb belgilash</button>
        </div>
        
        <div class="glass-card" style="display: flex; justify-content: space-between;">
            <div><small>Jami kitobxonlar</small><h3 id="statUsers">0</h3></div>
            <div><small>O'qilgan kunlar</small><h3 id="statDays">0</h3></div>
        </div>
    </div>

    <div id="ranking" class="section">
        <h1>Top Kitobxonlar 🏆</h1>
        <div id="leaderboardList"></div>
    </div>

    <div id="library" class="section">
        <h1>Kutubxona 📚</h1>
        <div class="glass-card">
            <h3>Hafta kitobi</h3>
            <p style="color: #aaa;">"Atom odatlar" - James Clear</p>
            <div style="height: 150px; background: url('https://m.media-amazon.com/images/I/51-nXsSRfZL.jpg') center/cover; border-radius: 15px;"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showSec('home', this)"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="showSec('ranking', this)"><i class="fas fa-trophy"></i></div>
        <div class="nav-item" onclick="showSec('library', this)"><i class="fas fa-book"></i></div>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('eliteLib')) || [];

        function showSec(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'ranking') renderLeaderboard();
        }

        function addActivity() {
            const name = document.getElementById('userName').value.trim();
            if(!name) return alert("Ismingizni yozing!");
            
            let user = db.find(u => u.name === name);
            if(user) user.score++;
            else db.push({name, score: 1});

            localStorage.setItem('eliteLib', JSON.stringify(db));
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            updateStats();
            alert("Ball qo'shildi! Reytingni tekshiring.");
        }

        function updateStats() {
            document.getElementById('statUsers').innerText = db.length;
            document.getElementById('statDays').innerText = db.reduce((a,b) => a + b.score, 0);
        }

        function renderLeaderboard() {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = '';
            db.sort((a,b) => b.score - a.score);
            db.forEach((u, i) => {
                list.innerHTML += `
                    <div class="rank-item">
                        <div class="rank-num">#${i+1}</div>
                        <div class="user-avatar">${u.name[0].toUpperCase()}</div>
                        <div style="flex:1"><b>${u.name}</b></div>
                        <div class="score-pill">${u.score} ball</div>
                    </div>
                `;
            });
        }

        updateStats();
    </script>
</body>
    </html>
